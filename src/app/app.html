<header>
  <mat-toolbar class="app-toolbar">
    <span class="app-title">PyPad</span>
    <span class="toolbar-spacer"></span>

    <mat-button-toggle-group
      class="layout-toggle"
      [value]="layout()"
      (change)="layout.set($event.value)"
      hideSingleSelectionIndicator
      aria-label="Layout mode"
    >
      <mat-button-toggle value="editor" matTooltip="Editor only" aria-label="Editor only">
        <mat-icon>code</mat-icon>
      </mat-button-toggle>
      <mat-button-toggle value="both" matTooltip="Editor and panel" aria-label="Editor and panel">
        <mat-icon>view_agenda</mat-icon>
      </mat-button-toggle>
      <mat-button-toggle value="panel" matTooltip="Panel only" aria-label="Panel only">
        <mat-icon>dvr</mat-icon>
      </mat-button-toggle>
    </mat-button-toggle-group>

    <button
      mat-icon-button
      (click)="theme.toggle()"
      [matTooltip]="themeTooltip()"
      [attr.aria-label]="themeTooltip()"
    >
      <mat-icon>{{ themeIcon() }}</mat-icon>
    </button>
  </mat-toolbar>
</header>

<main class="app-workspace" #workspace>
  @if (showEditor()) {
    <section class="editor-pane" [style.flex]="layout() === 'both' ? splitRatio() : 1" aria-label="Code editor">
      <app-editor
        [initialCode]="initialCode"
        [isDark]="theme.effectiveIsDark()"
        (codeChange)="onCodeChange($event)"
      />
    </section>
  }

  @if (showDivider()) {
    <div
      class="pane-divider"
      role="separator"
      aria-orientation="horizontal"
      aria-label="Resize panels"
      (pointerdown)="onDividerPointerDown($event)"
    ></div>
  }

  @if (showPanel()) {
    <section class="console-pane" [style.flex]="layout() === 'both' ? 1 - splitRatio() : 1" aria-label="Console output">
      <div class="pane-header" aria-hidden="true">Console</div>
      <app-console [lines]="outputLines()" />
    </section>
  }
</main>

<button
  mat-fab
  class="run-fab"
  (click)="runCode()"
  [disabled]="!runner.isReady()"
  [matTooltip]="runner.isReady() ? 'Run (Ctrl+R)' : 'Loading MicroPython…'"
  aria-label="Run Python code"
>
  <mat-icon aria-hidden="true">{{ runner.isReady() ? 'play_arrow' : 'hourglass_empty' }}</mat-icon>
</button>
