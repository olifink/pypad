<header>
  <mat-toolbar class="app-toolbar">
    <span class="app-title">PyPad</span>
    <span class="toolbar-spacer"></span>
    <button
      mat-icon-button
      (click)="theme.toggle()"
      [matTooltip]="themeTooltip()"
      [attr.aria-label]="themeTooltip()"
    >
      <mat-icon>{{ themeIcon() }}</mat-icon>
    </button>
  </mat-toolbar>
</header>

<main class="app-workspace" #workspace>
  <section class="editor-pane" [style.flex]="splitRatio()" aria-label="Code editor">
    <app-editor
      [initialCode]="initialCode"
      [isDark]="theme.effectiveIsDark()"
      (codeChange)="onCodeChange($event)"
    />
  </section>

  <div
    class="pane-divider"
    role="separator"
    aria-orientation="horizontal"
    aria-label="Resize panels"
    (pointerdown)="onDividerPointerDown($event)"
  ></div>

  <section class="console-pane" [style.flex]="1 - splitRatio()" aria-label="Console output">
    <div class="pane-header" aria-hidden="true">Console</div>
    <app-console [lines]="outputLines()" />
  </section>
</main>

<button
  mat-fab
  class="run-fab"
  (click)="runCode()"
  [disabled]="!runner.isReady()"
  [matTooltip]="runner.isReady() ? 'Run (Ctrl+Enter)' : 'Loading MicroPython…'"
  aria-label="Run Python code"
>
  <mat-icon aria-hidden="true">{{ runner.isReady() ? 'play_arrow' : 'hourglass_empty' }}</mat-icon>
</button>
