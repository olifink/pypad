<header>
  <mat-toolbar class="app-toolbar">
    <span class="app-title">PyPad</span>
  </mat-toolbar>
</header>

<main class="app-workspace">
  <section class="editor-pane" aria-label="Code editor">
    <app-editor [initialCode]="initialCode" (codeChange)="onCodeChange($event)" />
  </section>

  <div class="pane-divider" role="separator" aria-orientation="horizontal"></div>

  <section class="console-pane" aria-label="Console output">
    <div class="pane-header" aria-hidden="true">Console</div>
    <app-console [lines]="outputLines()" />
  </section>
</main>

<button mat-fab class="run-fab" (click)="runCode()" aria-label="Run Python code">
  <mat-icon aria-hidden="true">play_arrow</mat-icon>
</button>
