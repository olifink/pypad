<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Pypad</title>
  <base href="/" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32x32.png" />
  <script>
    const s = document.createElement('script');
    s.type = 'module';
    s.src = 'pyscript/core.js';
    document.head.appendChild(s);
  </script>
  <!-- Capture the MicroPython interpreter + io objects for the Angular REPL component.
       Uses a regular script (not type="module") with a runtime-constructed URL so that
       Vite's static import analysis never sees the pyscript path. -->
  <script>
    const coreUrl = new URL('./pyscript/core.js', document.baseURI).href;
    import(coreUrl).then(({ hooks }) => {
      hooks.main.onReady.add(function captureInterpreter({ interpreter, io }) {
        hooks.main.onReady.delete(captureInterpreter);
        globalThis.pypad_interpreter = interpreter;
        globalThis.pypad_io = io;
      });
    });
  </script>
  <!-- Minimal MicroPython script to trigger PyScript initialisation so that
       hooks.main.onReady fires and the REPL can capture the interpreter. -->
  <script type="mpy">
    pass
  </script>
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#3776AB" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PyPad" />
  <link rel="apple-touch-icon" href="icons/icon-192x192.png" />
</head>

<body>
  <app-root></app-root>
  <noscript>Please enable JavaScript to continue using this application.</noscript>
</body>

</html>
